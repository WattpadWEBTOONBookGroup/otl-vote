<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thanks for Voting! — Operation: True Love</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fce4ef;
      font-family: 'Trebuchet MS', Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      border: 2px solid #f5a7c0;
    }
    .hearts {
      font-size: 32px;
      letter-spacing: 8px;
      display: block;
      margin-bottom: 24px;
      color: #e8426e;
    }
    .eyebrow {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #b03060;
      margin-bottom: 12px;
    }
    h1 {
      font-family: Georgia, serif;
      font-size: 32px;
      font-style: italic;
      font-weight: 700;
      color: #2a0a18;
      line-height: 1.3;
      margin-bottom: 16px;
    }
    h1 em {
      color: #e8426e;
    }
    p {
      font-size: 15px;
      color: #5a2038;
      line-height: 1.8;
      margin-bottom: 32px;
    }
    .fine {
      font-size: 11px;
      color: #b03060;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="hearts">♥ ♥ ♥</span>
    <div class="eyebrow">Your vote has been cast</div>
    <h1>Thanks for voting,<br><em>Operation: True Love</em> fan!</h1>
    <p>Your pick has been counted. Don't forget — pre-orders close <strong>April 29</strong> and bundles won't be restocked once they sell out.</p>
    <div class="fine">© Wattpad WEBTOON Book Group</div>
  </div>
</body>
</html>
